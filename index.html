<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agiota-Bank PRO Slim</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root { --blue: #3B82F6; --dark: #0F172A; --card: #111827; --border: #1E293B; --green: #10B981; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0B1120; font-family: 'Inter', sans-serif; color: #E2E8F0; padding-bottom: 2rem; }
  .header-pro { background: rgba(2,6,23,0.8); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(59,130,246,0.3); padding: 1rem; position: sticky; top: 0; z-index: 100; }
  .header-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .app-container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
  .card-form, .cliente-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 1.2rem; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.8rem; }
  .input-group label { font-size: 0.65rem; color: #94A3B8; text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 4px; }
  input, select { width: 100%; background: var(--dark); border: 1px solid var(--border); padding: 10px; border-radius: 12px; color: #fff; }
  .btn-primary { background: linear-gradient(95deg, var(--blue), #2563EB); border: none; font-weight: 700; padding: 12px; border-radius: 30px; color: #fff; cursor: pointer; width: 100%; margin-top: 10px; }
  .search-container { position: relative; margin: 1rem 0; }
  .search-container i { position: absolute; left: 15px; top: 15px; color: var(--blue); }
  .search-container input { padding-left: 40px; height: 45px; }
  .clientes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .card-header { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .stats-mini { display: flex; justify-content: space-between; background: var(--border); padding: 10px; border-radius: 12px; margin: 10px 0; font-size: 0.7rem; }
  .calendario-modern { display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); gap: 4px; margin: 10px 0; max-height: 80px; overflow-y: auto; }
  .dia-item { background: var(--border); text-align: center; padding: 5px; border-radius: 6px; font-size: 0.65rem; }
  .dia-pago { background: var(--green); } .dia-atrasado { background: #EF4444; }
  .acoes-card { display: flex; gap: 5px; margin-top: 10px; }
  .btn-action { flex: 1; border: none; padding: 8px; border-radius: 10px; color: #fff; font-size: 0.7rem; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<header class="header-pro">
  <div class="header-content">
    <div style="display:flex; align-items:center; gap:10px;"><i class="fas fa-hand-holding-usd" style="font-size:1.5rem; color:var(--blue)"></i> <h3>Agiota-Bank PRO</h3></div>
    <div style="font-size:0.9rem">Aberto: <span id="receitaTotal" style="color:var(--blue); font-weight:700">R$ 0,00</span></div>
  </div>
</header>

<div class="app-container">
  <div class="card-form">
    <div class="form-grid">
      <div class="input-group"><label>Nome</label><input id="nome"></div>
      <div class="input-group"><label>WhatsApp</label><input id="whatsapp"></div>
      <div class="input-group"><label>Rua/Nº</label><input id="endereco"></div>
      <div class="input-group"><label>Bairro</label><input id="bairro"></div>
      <div class="input-group"><label>Loja</label><input id="loja"></div>
      <div class="input-group"><label>Valor</label><input id="valor" type="number"></div>
      <div class="input-group"><label>Juros %</label><input id="juros" type="number" value="0"></div>
      <div class="input-group"><label>Crédito</label><input id="limite" type="number" value="500"></div>
      <div class="input-group"><label>Plano</label>
        <select id="diasPlano">
          <option value="0">Apenas Cadastro</option>
          <option value="15">15 dias</option><option value="20">20 dias</option>
          <option value="24">24 dias</option><option value="25">25 dias</option>
          <option value="30" selected>30 dias</option><option value="45">45 dias</option>
        </select>
      </div>
    </div>
    <button id="btnSalvar" class="btn-primary">Salvar no Sistema</button>
    <button id="btnC" class="btn-primary" style="display:none; background:#374151">Cancelar Edição</button>
  </div>

  <div class="search-container"><i class="fas fa-search"></i><input id="inputBusca" placeholder="Pesquisar por nome ou loja..."></div>
  <div id="listaClientes" class="clientes-grid"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const cfg = { 
    apiKey: "AIzaSyDpaVGxnlzONpdRKBT2fCE0-vFGtCQfMxw", 
    authDomain: "agiota-bank.firebaseapp.com", 
    databaseURL: "https://agiota-bank-default-rtdb.firebaseio.com", 
    projectId: "agiota-bank" 
  };

  const app = initializeApp(cfg);
  const db = getDatabase(app);
  const clRef = ref(db, 'clientes');
  let todos = {}, idEd = null;

  const getV = (id) => document.getElementById(id).value;
  const setV = (id, v) => document.getElementById(id).value = v;

  function render(data) {
    const list = document.getElementById("listaClientes");
    list.innerHTML = ""; let total = 0;
    const term = getV("inputBusca").toLowerCase();

    Object.entries(data || {}).forEach(([id, c]) => {
      if (!c.nome.toLowerCase().includes(term) && !c.loja.toLowerCase().includes(term)) return;
      total += (c.total || 0);
      const pagos = c.dias ? c.dias.filter(d => d === 'pago').length : 0;

      const div = document.createElement("div");
      div.className = "cliente-card";
      div.innerHTML = `
        <div class="card-header"><span>${c.nome}</span><i class="fas fa-edit" style="color:var(--blue);cursor:pointer" id="e-${id}"></i></div>
        <div style="font-size:0.75rem;margin-bottom:8px;opacity:0.8">${c.endereco || ''} | ${c.loja}</div>
        <p style="color:${c.total > 0 ? '#E2E8F0' : 'var(--green)'}"><strong>Dívida:</strong> R$ ${(c.total||0).toFixed(2)}</p>
        <div class="stats-mini"><span>Parcelas: ${pagos}/${c.diasTotal||0}</span><span>Crédito: R$ ${c.limite}</span></div>
        <div class="calendario-modern">${(c.dias||[]).map((s,i)=>`<div class="dia-item dia-${s}">${i+1}</div>`).join('')}</div>
        <div class="acoes-card">
          <button class="btn-action" style="background:var(--green)" id="p-${id}">Pago</button>
          <button class="btn-action" style="background:#F97316" id="a-${id}">Atraso</button>
          <button class="btn-action" style="background:#DC2626" id="d-${id}">Remover</button>
        </div>`;
      list.appendChild(div);
      
      document.getElementById(`p-${id}`).onclick = () => mStatus(id, c, 'pago');
      document.getElementById(`a-${id}`).onclick = () => mStatus(id, c, 'atrasado');
      document.getElementById(`d-${id}`).onclick = () => confirm("Remover?") && remove(ref(db, `clientes/${id}`));
      document.getElementById(`e-${id}`).onclick = () => {
        idEd = id; 
        ["nome","whatsapp","endereco","bairro","loja","limite"].forEach(k => setV(k, c[k]||''));
        setV("valor", c.total); 
        document.getElementById("btnC").style.display = "block";
        window.scrollTo(0,0);
      };
    });
    document.getElementById("receitaTotal").innerText = `R$ ${total.toFixed(2)}`;
  }

  function mStatus(id, c, s) {
    if (!c.dias) return;
    let nd = [...c.dias]; 
    const px = nd.indexOf('futuro');
    if (px === -1) return alert("Finalizado!");
    nd[px] = s;
    if (!nd.includes('futuro')) {
      alert("Quitado!");
      update(ref(db, `clientes/${id}`), { total: 0, diasTotal: 0, dias: [] });
    } else update(ref(db, `clientes/${id}`), { dias: nd });
  }

  document.getElementById("btnSalvar").onclick = () => {
    const v = parseFloat(getV("valor")) || 0, j = parseFloat(getV("juros")) || 0, d = parseInt(getV("diasPlano"));
    const dados = {
      nome: getV("nome"), whatsapp: getV("whatsapp"), endereco: getV("endereco"), bairro: getV("bairro"),
      loja: getV("loja"), total: v + (v * j/100), limite: getV("limite"), diasTotal: d, dias: d>0 ? Array(d).fill('futuro') : []
    };
    idEd ? update(ref(db, `clientes/${idEd}`), dados) : push(clRef, dados);
    idEd = null; 
    document.getElementById("btnC").style.display = "none";
    ["nome","whatsapp","endereco","bairro","loja","valor","juros"].forEach(k => setV(k, k === "juros" ? "0" : ""));
  };

  onValue(clRef, s => { todos = s.val(); render(todos); });
  document.getElementById("inputBusca").oninput = () => render(todos);
  document.getElementById("btnC").onclick = () => { idEd = null; document.getElementById("btnC").style.display = "none"; ["nome","whatsapp","endereco","bairro","loja","valor"].forEach(k => setV(k, "")); };
</script>
</body>
       </html>
