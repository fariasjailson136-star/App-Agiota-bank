<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Agiota-Bank PRO - Automação de Quitação</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: linear-gradient(135deg, #0B1120 0%, #0F172A 100%); font-family: 'Inter', sans-serif; color: #E2E8F0; padding-bottom: 2rem; }
  
  .header-pro { background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(59, 130, 246, 0.3); padding: 1rem 1.5rem; position: sticky; top: 0; z-index: 100; }
  .header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .logo-icon { background: linear-gradient(145deg, #3B82F6, #2563EB); width: 42px; height: 42px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
  
  .app-container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
  .card-form { background: #111827; border-radius: 28px; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #1F2937; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 0.7rem; color: #94A3B8; text-transform: uppercase; font-weight: 600; }
  input, select { background: #0F172A; border: 1.5px solid #1E293B; padding: 12px; border-radius: 16px; color: #fff; }
  
  .search-container { position: relative; margin: 1.5rem 0; max-width: 500px; }
  .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #3B82F6; }
  .search-container input { width: 100%; padding-left: 45px; background: #111827; height: 50px; border: 1px solid #334155; border-radius: 16px; color: #fff; }

  .btn-primary { background: linear-gradient(95deg, #3B82F6, #2563EB); border: none; font-weight: 700; padding: 14px; border-radius: 40px; color: white; cursor: pointer; width: 100%; margin-top: 15px; }
  .btn-cancel { background: #374151; margin-top: 5px; }

  .clientes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
  .cliente-card { background: #0F172A; border-radius: 28px; border: 1px solid #1E293B; overflow: hidden; transition: 0.3s; }
  .card-header { padding: 1.2rem; border-bottom: 1px solid #1E293B; display: flex; justify-content: space-between; font-weight: bold; background: rgba(30, 41, 59, 0.2); }
  
  .stats-mini { display: flex; justify-content: space-between; background: #1E293B; padding: 12px; border-radius: 18px; margin-bottom: 15px; font-size: 0.75rem; border: 1px solid #334155; }
  .status-badge { padding: 3px 10px; border-radius: 8px; font-weight: 700; font-size: 0.65rem; }
  .excelente { background: #10B981; } .regular { background: #FBBF24; color: #000; } .risco { background: #EF4444; }

  .calendario-modern { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 5px; margin: 15px 0; max-height: 100px; overflow-y: auto; }
  .dia-item { background: #1E293B; text-align: center; padding: 6px; border-radius: 8px; font-size: 0.7rem; color: #94A3B8; }
  .dia-pago { background: #10B981; color: white; } .dia-atrasado { background: #EF4444; color: white; }
  
  .acoes-card { display: flex; gap: 8px; margin-top: 15px; }
  .btn-action { flex: 1; border: none; padding: 10px; border-radius: 12px; color: white; font-size: 0.75rem; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px; }
  
  footer { text-align: center; font-size: 0.75rem; color: #475569; margin-top: 3rem; padding: 20px; }
</style>
</head>
<body>

<header class="header-pro">
  <div class="header-content">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="logo-icon"><i class="fas fa-hand-holding-usd"></i></div>
      <div class="logo-text"><h1>Agiota-Bank PRO</h1><span>Gestão Cloud 3.0</span></div>
    </div>
    <div style="background:#1E293B; padding:8px 18px; border-radius:40px; border: 1px solid #334155;">
      Receita em Aberto: <span id="receitaTotal" style="color: #3B82F6; font-weight: bold;">R$ 0,00</span>
    </div>
  </div>
</header>

<div class="app-container">
  <div class="card-form">
    <h3 id="formTitle" style="margin-bottom:15px; font-size:1rem; color:#3B82F6;"><i class="fas fa-user-plus"></i> Novo Cliente / Empréstimo</h3>
    <div class="form-grid">
      <div class="input-group"><label>Nome</label><input id="nome" type="text"></div>
      <div class="input-group"><label>WhatsApp</label><input id="whatsapp" type="text"></div>
      <div class="input-group"><label>Endereço (Rua/Nº)</label><input id="endereco" type="text"></div>
      <div class="input-group"><label>Bairro</label><input id="bairro" type="text"></div>
      <div class="input-group"><label>Loja</label><input id="loja" type="text"></div>
      <div class="input-group"><label>Valor (R$)</label><input id="valor" type="number"></div>
      <div class="input-group"><label>Juros (%)</label><input id="juros" type="number" value="0"></div>
      <div class="input-group"><label>Limite Crédito (R$)</label><input id="limite" type="number" value="500"></div>
      <div class="input-group"><label>Plano de Dias</label>
        <select id="diasPlano">
          <option value="0">Apenas Cadastro (Sem Cobrança)</option>
          <option value="15">15 dias</option>
          <option value="20">20 dias</option>
          <option value="24">24 dias</option>
          <option value="25">25 dias</option>
          <option value="30" selected>30 dias</option>
          <option value="45">45 dias</option>
        </select>
      </div>
    </div>
    <button id="btnSalvar" class="btn-primary">Salvar no Sistema</button>
    <button id="btnCancelarEdicao" class="btn-primary btn-cancel" style="display:none;">Cancelar Edição</button>
  </div>

  <div class="search-container">
    <i class="fas fa-search"></i>
    <input type="text" id="inputBusca" placeholder="Pesquisar por nome, loja ou bairro...">
  </div>

  <div id="listaClientes" class="clientes-grid"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDpaVGxnlzONpdRKBT2fCE0-vFGtCQfMxw",
    authDomain: "agiota-bank.firebaseapp.com",
    databaseURL: "https://agiota-bank-default-rtdb.firebaseio.com",
    projectId: "agiota-bank",
    storageBucket: "agiota-bank.firebasestorage.app",
    messagingSenderId: "950459455059",
    appId: "1:950459455059:web:377a3862e6e68d44d498a6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const clientesRef = ref(db, 'clientes');

  let todosClientes = {};
  let idEdicao = null;

  function render(data) {
    const listaDiv = document.getElementById("listaClientes");
    listaDiv.innerHTML = "";
    let totalGeral = 0;
    const termo = document.getElementById("inputBusca").value.toLowerCase();

    if (!data) return;

    Object.entries(data).forEach(([id, c]) => {
      if (!c.nome.toLowerCase().includes(termo) && !c.loja.toLowerCase().includes(termo) && !c.bairro.toLowerCase().includes(termo)) return;
      
      const totalEmDivida = c.total || 0;
      totalGeral += totalEmDivida;
      
      const totalMarcado = c.dias ? c.dias.filter(d => d !== 'futuro').length : 0;
      const pagos = c.dias ? c.dias.filter(d => d === 'pago').length : 0;
      const pontualidade = totalMarcado > 0 ? Math.round((pagos / totalMarcado) * 100) : 100;
      const progresso = c.diasTotal > 0 ? (pagos / c.diasTotal) * 100 : 0;

      const card = document.createElement("div");
      card.className = "cliente-card";
      card.innerHTML = `
        <div class="card-header">
          <span>${c.nome}</span>
          <div style="display:flex; gap:10px; align-items:center;">
             <i class="fas fa-edit" style="cursor:pointer; color:#3B82F6;" id="edit-${id}"></i>
             <span style="color:#FBBF24">Crédito: R$ ${c.limite.toFixed(2)}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="stats-mini">
            <div><p style="opacity:0.6">Pontualidade</p><strong>${pontualidade}%</strong></div>
            <div><p style="opacity:0.6">Parcelas</p><strong>${pagos}/${c.diasTotal || 0}</strong></div>
            <button style="background:transparent; border:1px solid #3B82F6; color:#3B82F6; border-radius:8px; padding:2px 8px; font-size:0.6rem; cursor:pointer;" id="limite-${id}">+ Crédito</button>
          </div>
          
          <p style="font-size:0.8rem; margin-bottom:2px;"><strong>Endereço:</strong> ${c.endereco || 'Não informado'}</p>
          <p style="font-size:0.8rem; margin-bottom:5px;"><strong>Local:</strong> ${c.loja} - ${c.bairro}</p>
          <p style="color: ${totalEmDivida > 0 ? '#E2E8F0' : '#10B981'}">
            <strong>Dívida:</strong> ${totalEmDivida > 0 ? 'R$ ' + totalEmDivida.toFixed(2) : 'EM DIA / SEM COBRANÇA'}
          </p>

          ${c.diasTotal > 0 ? `
            <div style="background:#1E293B; height:8px; border-radius:10px; margin:10px 0; overflow:hidden;">
              <div style="background:#10B981; height:100%; width:${progresso}%;"></div>
            </div>
            <div class="calendario-modern">${c.dias.map((s, i) => `<div class="dia-item dia-${s}">${i+1}</div>`).join('')}</div>
          ` : '<div style="height:20px"></div>'}

          <div class="acoes-card">
            <button class="btn-action" style="background:#10B981" id="pago-${id}">Pago</button>
            <button class="btn-action" style="background:#F97316" id="atraso-${id}">Atraso</button>
            <button class="btn-action" style="background:#DC2626" id="del-${id}"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      `;
      listaDiv.appendChild(card);

      document.getElementById(`pago-${id}`).onclick = () => marcarStatus(id, c, 'pago');
      document.getElementById(`atraso-${id}`).onclick = () => marcarStatus(id, c, 'atrasado');
      document.getElementById(`del-${id}`).onclick = () => { if(confirm("Remover cliente?")) remove(ref(db, `clientes/${id}`)); };
      document.getElementById(`edit-${id}`).onclick = () => prepararEdicao(id, c);
      document.getElementById(`limite-${id}`).onclick = () => {
         const n = prompt("Novo limite:", c.limite);
         if(n) update(ref(db, `clientes/${id}`), { limite: parseFloat(n) });
      };
    });
    document.getElementById("receitaTotal").innerText = `R$ ${totalGeral.toFixed(2)}`;
  }

  function marcarStatus(id, cliente, status) {
    if (!cliente.dias) return;
    const novosDias = [...cliente.dias];
    const prox = novosDias.indexOf('futuro');
    if (prox === -1) return alert("Este empréstimo já foi finalizado!");
    novosDias[prox] = status;
    const aindaTemParcela = novosDias.includes('futuro');
    if (!aindaTemParcela) {
      alert(`Parabéns! O cliente ${cliente.nome} quitou o empréstimo.`);
      update(ref(db, `clientes/${id}`), { total: 0, diasTotal: 0, dias: [], consecutivosPago: 0 });
    } else {
      update(ref(db, `clientes/${id}`), { dias: novosDias });
    }
  }

  document.getElementById("btnSalvar").onclick = () => {
    const valor = parseFloat(document.getElementById("valor").value) || 0;
    const juros = parseFloat(document.getElementById("juros").value) || 0;
    const dias = parseInt(document.getElementById("diasPlano").value);
    
    const dados = {
      nome: document.getElementById("nome").value,
      whatsapp: document.getElementById("whatsapp").value,
      endereco: document.getElementById("endereco").value,
      loja: document.getElementById("loja").value,
      bairro: document.getElementById("bairro").value,
      total: valor + (valor * (juros / 100)),
      limite: parseFloat(document.getElementById("limite").value) || 0,
      diasTotal: dias,
      dias: dias > 0 ? Array(dias).fill('futuro') : []
    };

    if(idEdicao) {
      update(ref(db, `clientes/${idEdicao}`), dados);
      cancelarEdicao();
    } else {
      push(clientesRef, dados);
    }
    limparCampos();
  };

  function prepararEdicao(id, c) {
    idEdicao = id;
    document.getElementById("formTitle").innerText = "Editando: " + c.nome;
    document.getElementById("nome").value = c.nome;
    document.getElementById("whatsapp").value = c.whatsapp;
    document.getElementById("endereco").value = c.endereco || '';
    document.getElementById("loja").value = c.loja;
    document.getElementById("bairro").value = c.bairro;
    document.getElementById("valor").value = c.total;
    document.getElementById("limite").value = c.limite;
    document.getElementById("btnSalvar").innerText = "Atualizar";
    document.getElementById("btnCancelarEdicao").style.display = "block";
    window.scrollTo(0,0);
  }

  function cancelarEdicao() {
    idEdicao = null;
    document.getElementById("formTitle").innerText = "Novo Cliente / Empréstimo";
    document.getElementById("btnSalvar").innerText = "Salvar no Sistema";
    document.getElementById("btnCancelarEdicao").style.display = "none";
    limparCampos();
  }

  function limparCampos() {
    ["nome", "whatsapp", "endereco", "loja", "bairro", "valor", "limite"].forEach(i => document.getElementById(i).value = "");
  }

  document.getElementById("btnCancelarEdicao").onclick = cancelarEdicao;
  document.getElementById("inputBusca").oninput = () => render(todosClientes);
  onValue(clientesRef, (s) => { todosClientes = s.val(); render(todosClientes); });
</script>

<footer>
  Agiota-Bank PRO — Sistema de Gestão de Crédito Inteligente
</footer>
</body>
 </html>
