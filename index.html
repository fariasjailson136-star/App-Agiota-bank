<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Sistema de Controle de Cobranças - Gestão Inteligente</title>
<style>
* {
    box-sizing: border-box;
    user-select: none; /* Evita seleção acidental ao clicar nos dias */
}

body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: #0a0c10;
    color: #eef2ff;
    padding: 16px 12px 40px;
    margin: 0;
}

.container {
    max-width: 560px;
    margin: 0 auto;
}

h2 {
    font-size: 1.8rem;
    font-weight: 700;
    margin: 0 0 4px 0;
    background: linear-gradient(135deg, #E0F2FE, #A5F3C3);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
}

.sub {
    font-size: 0.75rem;
    color: #9ca3af;
    margin-bottom: 24px;
    border-left: 3px solid #10b981;
    padding-left: 10px;
}

.form-card {
    background: #1e1f2c;
    border-radius: 28px;
    padding: 20px 18px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.5);
    margin-bottom: 28px;
    border: 1px solid #2d2f3e;
}

.input-group {
    margin-bottom: 16px;
}

.input-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #9ca3cf;
    margin-bottom: 5px;
}

input, select {
    width: 100%;
    padding: 12px 14px;
    background: #0f1117;
    border: 1px solid #2d2f3e;
    border-radius: 20px;
    color: white;
    font-size: 1rem;
    transition: 0.2s;
}

input:focus, select:focus {
    outline: none;
    border-color: #10b981;
    box-shadow: 0 0 0 2px rgba(16,185,129,0.3);
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 40px;
    border: none;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
    background: #10b981;
    color: white;
    margin-top: 8px;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

button:active {
    transform: scale(0.97);
}

.btn-salvar-global {
    background: #3b82f6;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-salvar-global:active {
    background: #2563eb;
}

.lista-cobrancas {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.card {
    background: #181c27;
    border-radius: 32px;
    padding: 18px;
    border: 1px solid #2c2f3c;
    transition: 0.1s;
    box-shadow: 0 5px 12px rgba(0,0,0,0.3);
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    margin-bottom: 10px;
    border-bottom: 1px dashed #2a2e3c;
    padding-bottom: 8px;
}

.cliente-nome {
    font-size: 1.3rem;
    font-weight: bold;
    background: linear-gradient(120deg, #fff, #a7f3d0);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}

.resumo-valores {
    background: #10131c;
    border-radius: 24px;
    padding: 14px;
    margin: 12px 0;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
}

.resumo-item {
    flex: 1;
    text-align: center;
}

.resumo-item .label-peq {
    font-size: 0.7rem;
    color: #9ca3af;
    letter-spacing: 0.3px;
}

.resumo-item .valor-destaque {
    font-weight: 800;
    font-size: 1.2rem;
    color: #facc15;
}

.resumo-item .saldo-restante {
    font-size: 1.1rem;
    font-weight: bold;
    color: #f87171;
}

.grid-dias {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin: 16px 0 10px;
}

.day {
    aspect-ratio: 1 / 1;
    background: #252a3a;
    border-radius: 12px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.1s ease;
    border: 1px solid #32384b;
    color: #cfd8ff;
}

.day.active {
    background: #10b981;
    color: white;
    border-color: #34d399;
    box-shadow: 0 0 6px #10b981;
}

.day span {
    font-size: 10px;
    font-weight: 600;
}

.day .valor-marcado {
    font-size: 7px;
    display: block;
    position: absolute;
    bottom: 2px;
    left: 0;
    right: 0;
    text-align: center;
    font-weight: bold;
    color: #fff9c4;
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    width: 90%;
    margin: 0 auto;
    padding: 1px 0;
}

/* estilo para quadrados com valor pago */
.day.active .valor-marcado {
    background: #065f46;
    color: #e2e8f0;
}

.botao-salvar-cliente {
    background: #2c3e66;
    margin-top: 16px;
    padding: 10px;
    font-size: 0.85rem;
    border-radius: 60px;
    background: #2563eb;
}

.botao-salvar-cliente:active {
    background: #1d4ed8;
}

.saldo-info {
    font-size: 0.85rem;
    background: #00000040;
    border-radius: 20px;
    padding: 8px 12px;
    margin-top: 12px;
    text-align: center;
}

hr {
    border-color: #2d2f3e;
    margin: 5px 0;
}

@media (max-width: 480px) {
    .grid-dias {
        gap: 4px;
    }
    .day span {
        font-size: 9px;
    }
}
</style>
</head>
<body>
<div class="container">
    <h2>💸 Controle de Cobranças</h2>
    <div class="sub">Marque os dias pagos · Valor residual reduz automaticamente</div>

    <div class="form-card">
        <div class="input-group">
            <label>🧑 Nome completo</label>
            <input type="text" id="nome" placeholder="Ex: Ana Silva" autocomplete="off">
        </div>
        <div class="input-group">
            <label>💰 Valor emprestado (R$)</label>
            <input type="number" id="valor" placeholder="0,00" step="any">
        </div>
        <div class="input-group">
            <label>📈 Juros (%)</label>
            <input type="number" id="juros" placeholder="Ex: 10" step="any">
        </div>
        <div class="input-group">
            <label>🗓️ Prazo (dias)</label>
            <select id="dias">
                <option value="25">25 dias</option>
                <option value="30" selected>30 dias</option>
                <option value="45">45 dias</option>
            </select>
        </div>
        <button onclick="criarCliente()">➕ Criar Cobrança</button>
    </div>

    <!-- Botão salvar global (salva todo estado manualmente) -->
    <button class="btn-salvar-global" onclick="salvarGlobalManual()">💾 Salvar todas as alterações</button>

    <div id="lista" class="lista-cobrancas"></div>
</div>

<script>
// ------------------- MODEL -------------------
let dados = []; 

// Carregar do localStorage
function carregarDados() {
    const stored = localStorage.getItem("clientes_cobranca_v2");
    if(stored) {
        try {
            let parsed = JSON.parse(stored);
            // garantir estrutura correta para 'pagos' e também armazenar 'valorParcelaDiaria' e 'saldoAtual' para cada cliente
            if(Array.isArray(parsed)) {
                dados = parsed.map(cli => {
                    // Recriar compatibilidade: se não tiver saldoAtual, calcular com base nos pagamentos
                    if(cli.saldoAtual === undefined) {
                        let totalOriginal = calcularTotal(cli.valor, cli.juros);
                        let qtdPaga = (cli.pagos || []).filter(p => p === true).length;
                        let valorParcela = cli.valorParcelaDiaria || (totalOriginal / cli.dias);
                        let saldoCalc = totalOriginal - (qtdPaga * valorParcela);
                        cli.saldoAtual = Math.max(0, saldoCalc);
                    }
                    if(!cli.valorParcelaDiaria) {
                        let totalOrig = calcularTotal(cli.valor, cli.juros);
                        cli.valorParcelaDiaria = totalOrig / cli.dias;
                    }
                    if(!cli.pagos) cli.pagos = Array(cli.dias).fill(false);
                    // garantir tamanho correto do array pagos caso dias tenha mudado (evitar bugs)
                    if(cli.pagos.length !== cli.dias) {
                        let newPagos = Array(cli.dias).fill(false);
                        for(let i=0; i<Math.min(cli.pagos.length, cli.dias); i++) {
                            if(cli.pagos[i]) newPagos[i] = true;
                        }
                        cli.pagos = newPagos;
                        // recalcular saldo
                        let totalOrig = calcularTotal(cli.valor, cli.juros);
                        let parcela = totalOrig / cli.dias;
                        let pagas = newPagos.filter(v=>v===true).length;
                        cli.saldoAtual = totalOrig - (pagas * parcela);
                        cli.valorParcelaDiaria = parcela;
                    }
                    return cli;
                });
            }
        } catch(e) { console.warn(e); dados = []; }
    }
    if(!dados.length) dados = [];
    render();
}

function salvar() {
    localStorage.setItem("clientes_cobranca_v2", JSON.stringify(dados));
    // Após salvar, mostrar feedback rápido (opcional)
    showToast("✅ Alterações salvas");
}

function showToast(msg) {
    let toast = document.createElement("div");
    toast.innerText = msg;
    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.left = "50%";
    toast.style.transform = "translateX(-50%)";
    toast.style.backgroundColor = "#10b981";
    toast.style.color = "white";
    toast.style.padding = "8px 20px";
    toast.style.borderRadius = "40px";
    toast.style.fontWeight = "bold";
    toast.style.zIndex = "999";
    toast.style.fontSize = "0.8rem";
    toast.style.boxShadow = "0 4px 12px black";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1800);
}

function calcularTotal(valor, juros) {
    return valor + (valor * (juros / 100));
}

// Função para recalcular saldo atual de um cliente baseado nos dias pagos
function recalcularSaldoCliente(cliente) {
    let totalDevido = calcularTotal(cliente.valor, cliente.juros);
    let parcelaDiaria = cliente.valorParcelaDiaria;
    if (!parcelaDiaria || isNaN(parcelaDiaria)) {
        parcelaDiaria = totalDevido / cliente.dias;
        cliente.valorParcelaDiaria = parcelaDiaria;
    }
    let diasPagos = cliente.pagos.filter(p => p === true).length;
    let valorPagoTotal = diasPagos * parcelaDiaria;
    let novoSaldo = totalDevido - valorPagoTotal;
    cliente.saldoAtual = Math.max(0, novoSaldo);
    return cliente.saldoAtual;
}

// toggle de pagamento do dia
function toggleDia(clienteIndex, diaIndex) {
    let cliente = dados[clienteIndex];
    // Evita marcar duas vezes sem necessidade, apenas alterna
    let novoEstado = !cliente.pagos[diaIndex];
    cliente.pagos[diaIndex] = novoEstado;
    
    // Recalcula saldo após alteração
    recalcularSaldoCliente(cliente);
    
    // Salva automaticamente CADA VEZ que marca/desmarca um quadrado (conforme solicitado: "salvar cobrança toda vez que marca uma cobrança")
    salvar();
    
    // Re-renderiza para atualizar valores na tela e mostrar o valor da cobrança no quadrado
    render();
}

// Função de salvar manual global
function salvarGlobalManual() {
    salvar();
}

function criarCliente() {
    let nome = document.getElementById("nome").value.trim();
    let valor = parseFloat(document.getElementById("valor").value);
    let juros = parseFloat(document.getElementById("juros").value);
    let dias = parseInt(document.getElementById("dias").value);

    if (!nome) {
        alert("Por favor, informe o nome do cliente.");
        return;
    }
    if (isNaN(valor) || valor <= 0) {
        alert("Valor emprestado deve ser maior que zero.");
        return;
    }
    if (isNaN(juros) || juros < 0) {
        alert("Juros deve ser um número válido (0 ou mais).");
        return;
    }
    if (isNaN(dias) || dias < 1) {
        alert("Prazo inválido.");
        return;
    }

    let totalComJuros = calcularTotal(valor, juros);
    let valorParcelaDiaria = totalComJuros / dias;
    
    let novoCliente = {
        nome: nome,
        valor: valor,
        juros: juros,
        total: totalComJuros,
        dias: dias,
        pagos: Array(dias).fill(false),
        saldoAtual: totalComJuros,   // saldo inicial = total com juros
        valorParcelaDiaria: valorParcelaDiaria
    };
    
    dados.push(novoCliente);
    salvar();
    render();
    
    // limpar campos opcionais mas manter para facilitar
    document.getElementById("nome").value = "";
    document.getElementById("valor").value = "";
    document.getElementById("juros").value = "";
}

// Renderização completa mostrando: valor do empréstimo com juros, valor de cada cobrança no quadrado, e saldo diminuindo
function render() {
    let listaDiv = document.getElementById("lista");
    listaDiv.innerHTML = "";
    
    dados.forEach((cliente, idx) => {
        // Recalcular saldo atual por segurança
        let totalDevido = cliente.total; // valor + juros
        let parcela = cliente.valorParcelaDiaria;
        if (!parcela || isNaN(parcela) || parcela === 0) {
            parcela = totalDevido / cliente.dias;
            cliente.valorParcelaDiaria = parcela;
        }
        let diasPagos = cliente.pagos.filter(p => p === true).length;
        let valorJaPago = diasPagos * parcela;
        let saldoRestante = totalDevido - valorJaPago;
        if(saldoRestante < 0) saldoRestante = 0;
        cliente.saldoAtual = saldoRestante;
        
        // Criação do card
        let card = document.createElement("div");
        card.className = "card";
        
        // Cabeçalho
        let headerDiv = document.createElement("div");
        headerDiv.className = "card-header";
        headerDiv.innerHTML = `
            <span class="cliente-nome">${escapeHtml(cliente.nome)}</span>
            <span style="font-size:0.75rem; background:#1f2a3e; padding:4px 10px; border-radius:20px;">📅 ${cliente.dias} dias</span>
        `;
        card.appendChild(headerDiv);
        
        // Resumo com valor do empréstimo já com juros EM CIMA do valor (destacado)
        let resumoDiv = document.createElement("div");
        resumoDiv.className = "resumo-valores";
        resumoDiv.innerHTML = `
            <div class="resumo-item">
                <div class="label-peq">💰 Empréstimo</div>
                <div class="valor-destaque" style="color:#c084fc;">R$ ${cliente.valor.toFixed(2)}</div>
            </div>
            <div class="resumo-item">
                <div class="label-peq">📈 + Juros (${cliente.juros}%)</div>
                <div class="valor-destaque" style="color:#facc15;">R$ ${(cliente.total - cliente.valor).toFixed(2)}</div>
            </div>
            <div class="resumo-item">
                <div class="label-peq">💵 TOTAL COM JUROS</div>
                <div class="valor-destaque" style="color:#4ade80; font-size:1.3rem;">R$ ${totalDevido.toFixed(2)}</div>
            </div>
        `;
        card.appendChild(resumoDiv);
        
        // Valor da parcela diária (cobrança por dia)
        let parcelaInfo = document.createElement("div");
        parcelaInfo.style.backgroundColor = "#0b0e17";
        parcelaInfo.style.borderRadius = "20px";
        parcelaInfo.style.padding = "8px 12px";
        parcelaInfo.style.margin = "12px 0 6px";
        parcelaInfo.style.fontSize = "0.8rem";
        parcelaInfo.style.display = "flex";
        parcelaInfo.style.justifyContent = "space-between";
        parcelaInfo.innerHTML = `
            <span>💸 Valor por dia (cobrança):</span>
            <strong style="color:#facc15;">R$ ${parcela.toFixed(2)}</strong>
        `;
        card.appendChild(parcelaInfo);
        
        // Saldo restante com diminuição dinâmica
        let saldoBlock = document.createElement("div");
        saldoBlock.className = "saldo-info";
        saldoBlock.innerHTML = `
            🟢 VALOR RESTANTE A PAGAR: <strong style="font-size:1.2rem; color:#fb923c;">R$ ${saldoRestante.toFixed(2)}</strong>
            ${diasPagos > 0 ? `<span style="margin-left:12px;">✔️ ${diasPagos} dia(s) pago(s)</span>` : ''}
        `;
        card.appendChild(saldoBlock);
        
        // Grid de dias (quadrados)
        let grid = document.createElement("div");
        grid.className = "grid-dias";
        
        for(let d = 0; d < cliente.dias; d++) {
            let dayDiv = document.createElement("div");
            dayDiv.className = "day" + (cliente.pagos[d] ? " active" : "");
            
            // Número do dia
            let numeroSpan = document.createElement("span");
            numeroSpan.innerText = d+1;
            dayDiv.appendChild(numeroSpan);
            
            // Mostrar o valor da cobrança dentro do quadrado quando estiver marcado (e também sugerir até quando não marcado? mas especificação: "valor da cobrança apareça nos quadrados marcados")
            if(cliente.pagos[d]) {
                let valorSpan = document.createElement("span");
                valorSpan.className = "valor-marcado";
                valorSpan.innerText = `R$ ${parcela.toFixed(2)}`;
                dayDiv.appendChild(valorSpan);
            } else {
                // Opcional: podemos exibir o valor em tooltip ou pequeno, mas a pedido: "valor da cobrança apareça nos quadrados marcados"
                // Para melhor UX, também pode exibir mini cifrão? mas não obrigatório. Seguimos apenas marcado.
                // Porém adicionamos um pequeno sinal de valor pendente?
                let hintSpan = document.createElement("span");
                hintSpan.style.position = "absolute";
                hintSpan.style.bottom = "2px";
                hintSpan.style.fontSize = "6px";
                hintSpan.style.opacity = "0.5";
                hintSpan.innerText = `R$ ${parcela.toFixed(2)}`;
                dayDiv.appendChild(hintSpan);
            }
            
            dayDiv.onclick = (function(indiceCliente, indiceDia) {
                return function() { toggleDia(indiceCliente, indiceDia); };
            })(idx, d);
            
            grid.appendChild(dayDiv);
        }
        
        card.appendChild(grid);
        
        // Botão de salvar específico para este cliente (salva estado)
        let btnSalvarCliente = document.createElement("button");
        btnSalvarCliente.innerText = "💾 Salvar alterações deste cliente";
        btnSalvarCliente.className = "botao-salvar-cliente";
        btnSalvarCliente.onclick = (function(index) {
            return function() { 
                salvar(); 
                showToast(`Cobrança de ${dados[index].nome} salva!`);
            };
        })(idx);
        card.appendChild(btnSalvarCliente);
        
        listaDiv.appendChild(card);
    });
    
    if(dados.length === 0) {
        let emptyMsg = document.createElement("div");
        emptyMsg.className = "card";
        emptyMsg.style.textAlign = "center";
        emptyMsg.style.padding = "30px";
        emptyMsg.innerHTML = "📭 Nenhuma cobrança ativa.<br>Crie sua primeira cobrança acima.";
        listaDiv.appendChild(emptyMsg);
    }
}

// Função simples de escape para evitar XSS
function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
    });
}

// Inicialização e escuta de eventos
carregarDados();

// Garantir que quando o usuário clicar em salvar global, também mantenha
window.salvarGlobalManual = salvarGlobalManual;
window.criarCliente = criarCliente;
window.toggleDia = toggleDia; // exposto mas já usado via onclick no render

// Adicional: exportar funções para onclick global funcionar
window.salvarGlobalManual = function() {
    salvar();
    showToast("✅ Todas as cobranças foram salvas!");
};

// Re-render quando houver mudança vinda de toggle (já chama render)
</script>
</body>
</html>
